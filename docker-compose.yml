version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: jf_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: journeyfaith
      MONGO_INITDB_ROOT_PASSWORD: jf_dev_2025
      MONGO_INITDB_DATABASE: journeyfaith_dev
    ports:
      - "27027:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: jf_redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
